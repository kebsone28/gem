name: ged_os

services:
  # ============ NGINX REVERSE PROXY ============
  nginx:
    image: nginx:alpine
    container_name: ged-os-proxy
    ports:
      # Ports hote dedies GEM SAAS pour eviter les collisions avec les autres apps Docker.
      - "${GED_OS_HTTP_PORT:-8088}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
    depends_on:
      - app
    networks:
      - ged_os_internal
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1/health" ]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============ NODE.JS APPLICATION ============
  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ged-os-api
    ports:
      - "${GED_OS_API_PORT:-5009}:3001"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3001
      # ⚠ PRODUCTION: Override ALL defaults below via .env or host env vars
      #   Never deploy with placeholder DB_PASSWORD, JWT_SECRET, or REDIS_PASSWORD
      DATABASE_URL: postgresql://${DB_USER:-proquelec}:${DB_PASSWORD:-__CHANGE_ME__}@postgres:5432/${DB_NAME:-proquelec_saa}?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_ENABLED: "true"
      REDIS_PASSWORD: ${REDIS_PASSWORD:-__CHANGE_ME__}
      JWT_SECRET: ${JWT_SECRET:-__CHANGE_ME__}
      REFRESH_TOKEN_SECRET: ${REFRESH_TOKEN_SECRET:-__CHANGE_ME__}
      # WARNING: Override CORS_ORIGINS in production with explicit frontend domain.
      # Default loopback origins are for local development ONLY.
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8088,http://127.0.0.1:8088,http://localhost:5173}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - ged_os_internal
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:3001/health" ]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============ POSTGRESQL DATABASE ============
  postgres:
    image: postgis/postgis:16-3.4-alpine
    container_name: ged-os-db
    environment:
      POSTGRES_USER: ${DB_USER:-proquelec}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-securepassword}
      POSTGRES_DB: ${DB_NAME:-proquelec_saa}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    ports:
      - "${GED_OS_DB_PORT:-5435}:5432"
    networks:
      - ged_os_internal
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER:-proquelec}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    command:
      - "postgres"
      - "-c"
      - "max_connections=250"
      - "-c"
      - "shared_buffers=256MB"
      - "-c"
      - "effective_cache_size=1GB"
      - "-c"
      - "maintenance_work_mem=64MB"
      - "-c"
      - "checkpoint_completion_target=0.9"
      - "-c"
      - "wal_buffers=16MB"
      - "-c"
      - "default_statistics_target=100"

  # ============ OSRM ROUTING ENGINE ============
  osrm:
    image: osrm/osrm-backend
    container_name: ged-os-gps
    volumes:
      - ./backend/osrm_data:/data
    ports:
      - "${GED_OS_OSRM_PORT:-5010}:5000"
    command: osrm-routed --algorithm mld --max-table-size 100000 /data/senegal-latest.osrm
    restart: unless-stopped
    networks:
      - ged_os_internal

  # ============ MARTIN TILE SERVER ============
  martin:
    image: maplibre/martin
    container_name: ged-os-martin
    ports:
      - "${GED_OS_MARTIN_PORT:-3008}:3000"
    environment:
      WATCH_MODE: "true"
      DATABASE_URL: postgresql://${DB_USER:-proquelec}:${DB_PASSWORD:-securepassword}@postgres:5432/${DB_NAME:-proquelec_saa}?schema=public
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ged_os_internal
    restart: unless-stopped

  # ============ REDIS CACHE ============
  redis:
    image: redis:alpine
    container_name: ged-os-cache
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:-change_me_redis_pass}"]
    restart: unless-stopped
    networks:
      - ged_os_internal

  # ============ DB BACKUP (optional, uncomment to enable) ============
  # backup:
  #   image: postgis/postgis:16-3.4-alpine
  #   container_name: ged-os-db-backup
  #   entrypoint: |
  #     sh -c '
  #       while true; do
  #         PGPASSWORD="${DB_PASSWORD:-securepassword}" pg_dump -h postgres -U "${DB_USER:-proquelec}" -d "${DB_NAME:-proquelec_saa}" -Fc > /backups/dump_$$(date +%%Y%%m%%d%%H%%M%%S).dump
  #         find /backups -name "*.dump" -mtime +7 -delete
  #         sleep 86400
  #       done
  #     '
  #   environment:
  #     DB_USER: ${DB_USER:-proquelec}
  #     DB_PASSWORD: ${DB_PASSWORD:-securepassword}
  #     DB_NAME: ${DB_NAME:-proquelec_saa}
  #   volumes:
  #     - db_backups:/backups
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #   networks:
  #     - ged_os_internal
  #   restart: unless-stopped

volumes:
  postgres_data:
    driver: local
    name: ged_os_postgres_data
  db_backups:
    driver: local
    name: ged_os_db_backups

networks:
  ged_os_internal:
    driver: bridge
    name: ged_os_internal
