<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion — Électrification de Masse</title>
    <!-- Tailwind CSS -->
    <link rel="stylesheet" href="src/output.css">
    <link href="src/dark.css" rel="stylesheet">
    <script src="vendor/fontawesome/all.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap');

        :root {
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(255, 255, 255, 0.3);
            --primary: #4f46e5;
            --secondary: #6366f1;
        }

        .dark {
            --glass-bg: rgba(15, 23, 42, 0.8);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 50%, #db2777 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Animated background blobs */
        .blob {
            position: absolute;
            filter: blur(80px);
            z-index: 0;
            border-radius: 50%;
            animation: move 20s infinite alternate;
        }

        .blob-1 {
            width: 400px;
            height: 400px;
            background: rgba(79, 70, 229, 0.4);
            top: -100px;
            left: -100px;
        }

        .blob-2 {
            width: 300px;
            height: 300px;
            background: rgba(219, 39, 119, 0.4);
            bottom: -50px;
            right: -50px;
            animation-duration: 25s;
        }

        @keyframes move {
            from {
                transform: translate(0, 0) scale(1);
            }

            to {
                transform: translate(50px, 100px) scale(1.1);
            }
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            z-index: 10;
            width: 100%;
            max-width: 420px;
            padding: 3rem 2rem;
            transform: translateY(20px);
            opacity: 0;
            animation: slideIn 0.8s ease-out forwards;
        }

        @keyframes slideIn {
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .input-group {
            position: relative;
            margin-bottom: 1.5rem;
        }

        .input-group label {
            display: block;
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
            transition: color 0.3s;
        }

        .input-field {
            width: 100%;
            padding: 0.875rem 1rem;
            padding-left: 2.75rem;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid transparent;
            color: var(--text-main);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .input-field:focus {
            background: rgba(255, 255, 255, 0.2);
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
        }

        .input-icon {
            position: absolute;
            left: 1rem;
            top: 2.65rem;
            color: var(--text-muted);
            transition: color 0.3s;
        }

        .input-field:focus+.input-icon,
        .input-group:focus-within label {
            color: var(--primary);
        }

        .btn-login {
            width: 100%;
            background: linear-gradient(to right, #4f46e5, #6366f1);
            color: white;
            padding: 1rem;
            border-radius: 12px;
            font-weight: 700;
            margin-top: 1rem;
            transition: all 0.3s;
            box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.3);
        }

        .btn-login:hover {
            transform: translateY(-2px) scale(1.01);
            box-shadow: 0 20px 25px -5px rgba(79, 70, 229, 0.4);
            filter: brightness(1.1);
        }

        .btn-login:active {
            transform: scale(0.98);
        }

        .login-loader {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .error-message {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #ef4444;
            padding: 0.75rem;
            border-radius: 12px;
            font-size: 0.875rem;
            text-align: center;
            margin-bottom: 1.5rem;
            display: none;
            animation: shake 0.4s ease-in-out;
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            25% {
                transform: translateX(-5px);
            }

            75% {
                transform: translateX(5px);
            }
        }

        .theme-switch {
            position: absolute;
            top: 2rem;
            right: 2rem;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            padding: 0.75rem;
            border-radius: 50%;
            cursor: pointer;
            z-index: 100;
            color: white;
            transition: all 0.3s;
        }

        .theme-switch:hover {
            transform: rotate(30deg) scale(1.1);
        }
    </style>
</head>

<body class="light">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <div class="theme-switch" id="themeToggle" title="Changer le thème">
        <i class="fas fa-moon"></i>
    </div>

    <div class="glass-card">
        <div class="text-center mb-10">
            <div
                class="w-20 h-20 bg-indigo-600 rounded-2xl flex items-center justify-center mx-auto mb-6 shadow-xl shadow-indigo-500/30">
                <i class="fas fa-bolt text-white text-4xl"></i>
            </div>
            <h1 class="text-3xl font-bold text-gray-900 dark:text-white mb-2 tracking-tight">Bienvenue</h1>
            <p class="text-gray-500 dark:text-gray-400">Connectez-vous pour continuer</p>
        </div>

        <div id="errorBox" class="error-message">
            <i class="fas fa-exclamation-circle mr-2"></i> <span id="errorText">Identifiants incorrects</span>
        </div>

        <form id="loginForm">
            <div class="input-group">
                <label for="email">Email</label>
                <input type="email" id="email" class="input-field" placeholder="votre.email@example.com" required
                    autocomplete="email">
                <i class="fas fa-envelope input-icon"></i>
            </div>

            <div class="input-group">
                <div class="flex justify-between items-center mb-1">
                    <label for="password" class="!mb-0">Mot de passe</label>
                </div>
                <input type="password" id="password" class="input-field" placeholder="••••••••" required
                    autocomplete="current-password">
                <i class="fas fa-lock input-icon"></i>
            </div>

            <div class="flex items-center justify-between mb-8">
                <label class="flex items-center text-sm font-medium text-gray-600 dark:text-gray-400 cursor-pointer">
                    <input type="checkbox"
                        class="w-4 h-4 text-indigo-600 border-gray-300 rounded focus:ring-indigo-500 mr-2">
                    Rester connecté
                </label>
                <a href="#" class="text-sm font-semibold text-indigo-600 hover:text-indigo-500 transition-colors">Oublié
                    ?</a>
            </div>

            <button type="submit" id="submitBtn" class="btn-login flex items-center justify-center gap-3">
                <span>Se Connecter</span>
                <div class="login-loader" id="loader"></div>
            </button>
        </form>

        <p class="text-center mt-10 text-sm text-gray-500 dark:text-gray-400">
            Besoin d'aide ? <a href="#" class="font-bold text-indigo-600 hover:text-indigo-500">Contacter le support</a>
        </p>
    </div>

    <!-- Scripts -->
    <link rel="stylesheet" href="vendor/sweetalert2/sweetalert2.min.css">
    <script src="vendor/sweetalert2/sweetalert2.min.js"></script>
    <script src="ApiService.js"></script>

    <script type="module">
        // Theme Management
        const themeToggle = document.getElementById('themeToggle');
        const icon = themeToggle.querySelector('i');

        // Load preferred theme
        if (localStorage.getItem('theme') === 'dark') {
            document.body.classList.remove('light');
            document.body.classList.add('dark');
            icon.className = 'fas fa-sun';
        }

        themeToggle.addEventListener('click', () => {
            const isDark = document.body.classList.contains('dark');
            if (isDark) {
                document.body.classList.remove('dark');
                document.body.classList.add('light');
                icon.className = 'fas fa-moon';
                localStorage.setItem('theme', 'light');
            } else {
                document.body.classList.remove('light');
                document.body.classList.add('dark');
                icon.className = 'fas fa-sun';
                localStorage.setItem('theme', 'dark');
            }
        });

        // Login Logic
        const form = document.getElementById('loginForm');
        const submitBtn = document.getElementById('submitBtn');
        const loader = document.getElementById('loader');
        const errorBox = document.getElementById('errorBox');
        const errorText = document.getElementById('errorText');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            // Reset UI
            errorBox.style.display = 'none';
            submitBtn.disabled = true;
            loader.style.display = 'block';
            submitBtn.querySelector('span').textContent = 'Authentification...';

            try {
                // Use existing ApiService
                if (!window.apiService) {
                    throw new Error("ApiService non chargé. Vérifiez l'infrastructure.");
                }

                await window.apiService.login(email, password);

                // Redirection post-login basée sur le rôle
                const user = window.apiService.currentUser;
                const role = user?.role || 'public';

                let target = 'index.html';
                if (role === 'logistique') target = 'logistique.html';
                else if (role === 'terrain') target = 'terrain.html';

                // Animation de succès
                submitBtn.classList.remove('bg-indigo-600');
                submitBtn.classList.add('bg-emerald-500');
                submitBtn.querySelector('span').textContent = 'Succès !';
                loader.style.display = 'none';

                setTimeout(() => {
                    window.location.href = target;
                }, 800);

            } catch (err) {
                console.error('Erreur login:', err);
                errorBox.style.display = 'block';
                errorText.textContent = err.message || "Impossible de se connecter au serveur.";

                // Reset button
                submitBtn.disabled = false;
                loader.style.display = 'none';
                submitBtn.querySelector('span').textContent = 'Se Connecter';
            }
        });

        // Auto-check if already logged in
        window.addEventListener('load', () => {
            if (window.apiService && window.apiService.isAuthenticated) {
                const role = window.apiService.currentUser?.role || 'public';
                let target = 'index.html';
                if (role === 'logistique') target = 'logistique.html';
                else if (role === 'terrain') target = 'terrain.html';

                // Only redirect if not already on the way
                if (!window.location.search.includes('logout=true')) {
                    // window.location.href = target; // Optional: let them see the login beauty or auto-go
                }
            }
        });
    </script>
</body>

</html>
