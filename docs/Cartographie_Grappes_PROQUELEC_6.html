<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Cartographie et suivi des grappes – PROQUELEC</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  :root {
    --navy: #1E3A5F; --grey: #2D3748; --bg: #F7F9FB; --card: #FFFFFF; --border: #DCE3E8;
    --green: #2F855A; --amber: #B7791F; --red: #C53030;
  }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: Calibri, 'Segoe UI', Arial, sans-serif; background: var(--bg); color: var(--grey); }
  header { background: var(--navy); color: white; padding: 14px 26px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; }
  header h1 { font-size: 18px; margin: 0; font-weight: 700; }
  header .subtitle { font-size: 12px; opacity: 0.85; margin-top: 2px; }
  .tabs { display: flex; gap: 6px; flex-wrap: wrap; }
  .tab-btn { background: rgba(255,255,255,0.12); color: white; border: 1px solid rgba(255,255,255,0.3); padding: 7px 14px; border-radius: 6px; font-size: 12.5px; font-weight: 600; cursor: pointer; white-space: nowrap; }
  .tab-btn.active { background: white; color: var(--navy); }
  .view { display: none; }
  .view.active { display: block; }

  #searchBar { background: white; border-bottom: 1px solid var(--border); padding: 10px 26px; display: flex; gap: 10px; align-items: center; position: relative; }
  #searchInput { flex: 1; max-width: 420px; padding: 8px 12px; border: 1px solid var(--border); border-radius: 6px; font-size: 13px; }
  #searchInput:focus { outline: 2px solid var(--navy); }
  #searchResults { position: absolute; top: 46px; left: 26px; width: 420px; max-height: 320px; overflow-y: auto; background: white; border: 1px solid var(--border); border-radius: 8px; box-shadow: 0 6px 18px rgba(0,0,0,.12); display: none; z-index: 50; }
  #searchResults.show { display: block; }
  .search-result-item { padding: 9px 12px; border-bottom: 1px solid var(--border); cursor: pointer; font-size: 12.5px; }
  .search-result-item:hover { background: #F0F4F8; }
  .search-result-item .nm { font-weight: 700; color: var(--grey); }
  .search-result-item .meta2 { color: #6B7785; font-size: 11.5px; margin-top: 2px; }
  .search-empty { padding: 14px; color: #8A97A3; font-size: 12.5px; text-align: center; }

  .layout { display: flex; flex-wrap: wrap; gap: 0; align-items: flex-start; }
  #sidebar { width: 300px; min-width: 260px; background: var(--card); border-right: 1px solid var(--border); padding: 18px; max-height: calc(100vh - 116px); overflow-y: auto; }
  .region-title { font-size: 12.5px; font-weight: 700; color: var(--navy); text-transform: uppercase; letter-spacing: 0.04em; border-bottom: 2px solid var(--navy); padding-bottom: 4px; margin: 18px 0 8px; }
  .region-title:first-child { margin-top: 0; }
  .grappe-card { display: flex; align-items: center; gap: 10px; padding: 9px 10px; border-radius: 8px; border: 1px solid var(--border); margin-bottom: 7px; cursor: pointer; transition: background .15s, transform .1s; background: white; }
  .grappe-card:hover { background: #F0F4F8; transform: translateX(2px); }
  .grappe-card.disabled { opacity: 0.32; }
  .grappe-card.active { border-color: var(--navy); box-shadow: 0 0 0 1px var(--navy) inset; }
  .swatch { width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0; box-shadow: 0 0 0 1px rgba(0,0,0,.15); }
  .grappe-info { flex: 1; min-width: 0; }
  .grappe-info .ent { font-weight: 700; font-size: 13px; }
  .grappe-info .tel { font-size: 11.5px; color: var(--navy); }
  .count-badge { background: var(--navy); color: white; font-size: 11px; font-weight: 700; border-radius: 999px; padding: 2px 8px; }
  .reset-btn { width: 100%; margin: 10px 0 14px; padding: 8px; background: white; border: 1px solid var(--navy); color: var(--navy); border-radius: 6px; font-size: 12.5px; font-weight: 600; cursor: pointer; }
  .reset-btn:hover { background: var(--navy); color: white; }
  #totals { margin-top: 4px; padding: 12px; background: #FFF8E8; border: 1px solid #F0DDA8; border-radius: 8px; font-size: 12.5px; line-height: 1.7; }
  #totals b { color: var(--navy); }
  #panels { flex: 1; display: flex; flex-wrap: wrap; gap: 18px; padding: 20px; justify-content: center; }
  .panel { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 14px; box-shadow: 0 1px 3px rgba(0,0,0,.04); }
  .panel h2 { font-size: 15px; margin: 0 0 8px; color: var(--navy); text-align: center; }
  .vpoint { stroke: white; stroke-width: 1.5; opacity: .85; cursor: pointer; transition: opacity .15s; }
  .vpoint:hover { stroke: var(--navy); stroke-width: 2; }
  .vpoint.has-alert { stroke: #C53030; stroke-width: 3; animation: alertPulse 1.6s ease-in-out infinite; }
  @keyframes alertPulse { 0%,100% { stroke-opacity: 1; } 50% { stroke-opacity: 0.35; } }
  .map-legend-alert { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--red); margin-top: 10px; justify-content: center; }
  .map-legend-alert .dot { width: 10px; height: 10px; border-radius: 50%; border: 2.5px solid #C53030; background: white; }
  #tooltip { position: fixed; pointer-events: none; background: var(--navy); color: white; font-size: 12px; padding: 7px 10px; border-radius: 6px; line-height: 1.5; box-shadow: 0 3px 10px rgba(0,0,0,.2); display: none; z-index: 10; max-width: 220px; }
  #tooltip b { display: block; font-size: 12.5px; }
  .lot-choice { display: flex; gap: 6px; margin-bottom: 16px; }
  .lot-choice button { flex: 1; padding: 7px 4px; border: 1px solid var(--border); background: white; border-radius: 6px; font-size: 12px; font-weight: 700; cursor: pointer; color: var(--grey); }
  .lot-choice button.active { background: var(--navy); color: white; border-color: var(--navy); }

  #bordereau-layout { display: flex; }
  #bordereau-sidebar { width: 300px; min-width: 260px; background: var(--card); border-right: 1px solid var(--border); padding: 18px; max-height: calc(100vh - 116px); overflow-y: auto; }
  #bordereau-content { flex: 1; padding: 24px; max-height: calc(100vh - 116px); overflow-y: auto; overflow-x: auto; }
  .table-scroll { overflow-x: auto; }
  table.bordereau { min-width: 900px; width: 100%; border-collapse: collapse; font-size: 11.5px; background: white; }
  .placeholder { color: #8A97A3; font-size: 14px; text-align: center; margin-top: 60px; }
  .bordereau-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 14px; flex-wrap: wrap; gap: 10px; }
  .bordereau-title h2 { margin: 0 0 4px; color: var(--navy); font-size: 18px; }
  .bordereau-title .meta { font-size: 13px; color: #5A6672; }
  .btn-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .print-btn, .export-btn, .import-btn { border: none; padding: 9px 16px; border-radius: 6px; font-size: 12.5px; font-weight: 600; cursor: pointer; color: white; }
  .print-btn { background: var(--navy); } .print-btn:hover { background: #14283F; }
  .export-btn { background: var(--green); } .export-btn:hover { background: #235C42; }
  .import-btn { background: #6B4E9C; } .import-btn:hover { background: #573F80; }
  #importFeedback { font-size: 12px; margin-bottom: 10px; }
  #importFeedback.success { color: var(--green); } #importFeedback.error { color: var(--red); }
  table.bordereau th, table.bordereau td { border: 1px solid #C5CDD3; padding: 5px 6px; text-align: left; vertical-align: middle; }
  table.bordereau th { background: var(--navy); color: white; font-size: 11px; text-transform: uppercase; letter-spacing: .02em; }
  table.bordereau tbody tr:nth-child(even) { background: #F5F8FA; }
  table.bordereau td.center, table.bordereau th.center { text-align: center; }
  table.bordereau input[type=checkbox] { width: 15px; height: 15px; cursor: pointer; }
  .obs-col input { width: 100%; border: none; background: transparent; font-size: 11.5px; font-family: inherit; padding: 2px; }
  .obs-col input:focus { outline: 1px solid var(--navy); background: white; }
  .status-select { width: 100%; min-width: 150px; font-size: 11px; font-family: inherit; padding: 4px 4px; border-radius: 5px; border: 1.4px solid #C5CDD3; cursor: pointer; font-weight: 600; color: white; appearance: none; }
  .status-select.st-fait { background-color: var(--green); border-color: var(--green); }
  .status-select.st-nonfait { background-color: #8A97A3; border-color: #8A97A3; }
  .status-select.st-encours { background-color: #2E86AB; border-color: #2E86AB; }
  .status-select.st-bloque { background-color: var(--red); border-color: var(--red); }
  .status-select.st-nonconforme { background-color: var(--amber); border-color: var(--amber); }
  .status-select.st-reporte { background-color: #6B4E9C; border-color: #6B4E9C; }
  .status-select.st-autre { background-color: #5A6672; border-color: #5A6672; }
  .justif-input { width: 100%; font-size: 11px; font-family: inherit; padding: 4px 5px; border-radius: 5px; border: 1.4px solid #C5CDD3; }
  .justif-input.required-empty { border-color: var(--red); background: #FFF1F1; }
  .justif-cell { min-width: 170px; }
  .lot-block { border-right: 2px solid #DCE3E8; }
  .lot-block:last-of-type { border-right: none; }
  .update-stamp { font-size: 9.5px; color: #8A97A3; margin-top: 2px; text-align: center; }
  .warning-banner { background: #FFF1F1; border: 1px solid #F5C6C6; color: var(--red); border-radius: 8px; padding: 8px 14px; font-size: 12.5px; margin-bottom: 12px; display: none; }
  .warning-banner.show { display: block; }
  .filter-row { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; font-size: 12.5px; flex-wrap: wrap; }
  .filter-row label { font-weight: 600; color: var(--grey); }
  .filter-row select { padding: 6px 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 12.5px; font-family: inherit; min-width: 220px; }
  .reset-filter-btn { padding: 6px 12px; border: 1px solid var(--navy); background: white; color: var(--navy); border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; }
  .reset-filter-btn:hover { background: var(--navy); color: white; }
  .save-indicator { font-size: 11.5px; color: var(--green); margin-left: 10px; opacity: 0; transition: opacity .3s; }
  .save-indicator.show { opacity: 1; }
  tr.row-conforme { box-shadow: inset 3px 0 0 var(--green); }

  #dashboard { padding: 24px; max-width: 1200px; margin: 0 auto; }
  .dash-cards { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 24px; }
  .dash-card { flex: 1; min-width: 160px; background: white; border: 1px solid var(--border); border-radius: 10px; padding: 16px; text-align: center; }
  .dash-card .num { font-size: 28px; font-weight: 700; color: var(--navy); }
  .dash-card .lbl { font-size: 12px; color: #5A6672; margin-top: 4px; text-transform: uppercase; letter-spacing: .03em; }
  .progress-section { background: white; border: 1px solid var(--border); border-radius: 10px; padding: 18px 20px; margin-bottom: 16px; }
  .progress-section h3 { margin: 0 0 14px; font-size: 14px; color: var(--navy); }
  .grappe-progress { margin-bottom: 14px; }
  .grappe-progress:last-child { margin-bottom: 0; }
  .gp-label { display: flex; justify-content: space-between; font-size: 12.5px; margin-bottom: 4px; }
  .gp-label .name { font-weight: 600; }
  .gp-label .pct { color: var(--navy); font-weight: 700; }
  .gp-bar-bg { height: 10px; background: #E8EDF0; border-radius: 6px; overflow: hidden; display: flex; }
  .gp-bar-seg { height: 100%; }
  .legend-row { display: flex; gap: 16px; font-size: 11.5px; color: #5A6672; margin-top: 10px; flex-wrap: wrap; }
  .legend-dot { display: inline-block; width: 9px; height: 9px; border-radius: 2px; margin-right: 5px; }

  #admin { padding: 24px; max-width: 1100px; margin: 0 auto; }
  .admin-section { background: white; border: 1px solid var(--border); border-radius: 10px; padding: 18px 20px; margin-bottom: 18px; }
  .admin-section h3 { margin: 0 0 6px; font-size: 15px; color: var(--navy); }
  .admin-section .hint { font-size: 12px; color: #8A97A3; margin-bottom: 14px; }
  .admin-row { display: flex; align-items: center; gap: 12px; padding: 8px 0; border-bottom: 1px solid #EEF1F3; flex-wrap: wrap; }
  .admin-row:last-child { border-bottom: none; }
  .admin-row .label-col { width: 220px; font-size: 13px; font-weight: 600; flex-shrink: 0; }
  .admin-row .swatch { width: 12px; height: 12px; border-radius: 50%; display: inline-block; margin-right: 6px; flex-shrink: 0; }
  .admin-row input[type=text] { flex: 1; min-width: 140px; padding: 7px 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 13px; font-family: inherit; }
  .admin-row input.tel-input { max-width: 160px; }
  .admin-save-btn { padding: 9px 18px; background: var(--navy); color: white; border: none; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; margin-top: 10px; }
  .admin-save-btn:hover { background: #14283F; }
  .admin-feedback { font-size: 12.5px; color: var(--green); margin-left: 12px; opacity: 0; transition: opacity .3s; }
  .admin-feedback.show { opacity: 1; }
  .village-table { width: 100%; border-collapse: collapse; font-size: 12.5px; }
  .village-table th, .village-table td { border: 1px solid var(--border); padding: 7px 9px; text-align: left; }
  .village-table th { background: #F0F4F8; font-weight: 700; color: var(--navy); }
  .village-table select { padding: 5px 8px; border: 1px solid var(--border); border-radius: 5px; font-size: 12.5px; font-family: inherit; }
  .village-search { width: 100%; padding: 8px 12px; border: 1px solid var(--border); border-radius: 6px; font-size: 13px; margin-bottom: 12px; }
  #dossiers { padding: 24px; max-width: 1000px; margin: 0 auto; }
  .dossier-btn { padding: 7px 16px; font-size: 12.5px; margin-top: 0; white-space: nowrap; }

  @media (max-width: 900px) {
    .layout, #bordereau-layout { flex-direction: column; }
    #sidebar, #bordereau-sidebar { width: 100%; max-height: none; border-right: none; border-bottom: 1px solid var(--border); }
    #searchResults { width: calc(100% - 52px); }
    .admin-row .label-col { width: 100%; }
  }

  @media print {
    header, .tabs, #sidebar, #bordereau-sidebar, .print-btn, .export-btn, .import-btn, #tooltip, #searchBar, .lot-choice, .save-indicator, .warning-banner, .filter-row, #view-dossiers, #view-admin { display: none !important; }
    body { background: white; }
    #bordereau-content { padding: 0; max-height: none; overflow: visible; }
    .view:not(.active) { display: none !important; }
    table.bordereau { font-size: 9.5px; }
    table.bordereau th { background: #1E3A5F !important; color: white !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    table.bordereau tbody tr:nth-child(even) { background: #F0F0F0 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .status-select { -webkit-print-color-adjust: exact; print-color-adjust: exact; font-size: 9px; }
    .justif-input { font-size: 9px; }
  }
</style>
</head>
<body>
<header>
  <div>
    <h1>Cartographie et suivi des grappes de raccordement</h1>
    <div class="subtitle">Projet PROQUELEC — Kaffrine &amp; Tambacounda — 3&nbsp;536 ménages répartis en 8 grappes</div>
  </div>
  <div class="tabs">
    <button class="tab-btn active" id="tabMapBtn">Carte</button>
    <button class="tab-btn" id="tabBordereauBtn">Bordereaux de suivi</button>
    <button class="tab-btn" id="tabDashBtn">Tableau de bord</button>
    <button class="tab-btn" id="tabAdminBtn">Administration</button>
    <button class="tab-btn" id="tabDossiersBtn">Dossiers Prestataires</button>
  </div>
</header>

<div id="searchBar">
  <input type="text" id="searchInput" placeholder="Rechercher un ménage par nom, téléphone ou n° d'ordre…" autocomplete="off">
  <div id="searchResults"></div>
</div>

<div class="view active" id="view-map">
  <div class="layout">
    <div id="sidebar">
      <div id="cards-container"></div>
      <button class="reset-btn" id="resetBtn">Afficher toutes les grappes</button>
      <div id="totals"></div>
    </div>
    <div id="panels"></div>
  </div>
  <div class="map-legend-alert"><span class="dot"></span> Anneau rouge clignotant = village comportant au moins un ménage en statut "Bloqué"</div>
</div>

<div class="view" id="view-bordereau">
  <div id="bordereau-layout">
    <div id="bordereau-sidebar">
      <div class="lot-choice">
        <button class="lot-btn active" data-lot="A">Lot A</button>
        <button class="lot-btn" data-lot="B">Lot B</button>
        <button class="lot-btn" data-lot="C">Lot C</button>
      </div>
      <div id="bordereau-cards-container"></div>
    </div>
    <div id="bordereau-content">
      <div class="placeholder">Sélectionnez un lot et une grappe pour afficher le bordereau de suivi.</div>
    </div>
  </div>
</div>

<div class="view" id="view-dashboard"><div id="dashboard"></div></div>

<div class="view" id="view-admin"><div id="admin"></div></div>

<div class="view" id="view-dossiers"><div id="dossiers"></div></div>

<div id="tooltip"></div>

<script>
/* ===================== MINI DOCX GENERATOR (pure JS, no CDN) ===================== */
function xmlEscape(s) {
  return String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

const DOCX_NAVY = "1E3A5F", DOCX_GREY = "2D3748", DOCX_LIGHTBLUE = "EAF1F8";

function wPara(opts) {
  // opts: { text, bold, italic, size (half-points), color, align ('center'|'right'), spacingBefore, spacingAfter, pageBreakBefore, border }
  const o = opts || {};
  const sz = o.size || 21;
  const rpr = '<w:rPr>' +
    (o.bold ? '<w:b/>' : '') +
    (o.italic ? '<w:i/>' : '') +
    '<w:color w:val="' + (o.color || DOCX_GREY) + '"/>' +
    '<w:sz w:val="' + sz + '"/><w:szCs w:val="' + sz + '"/>' +
    '</w:rPr>';
  const ppr = '<w:pPr>' +
    (o.pageBreakBefore ? '<w:pageBreakBefore/>' : '') +
    '<w:spacing w:before="' + (o.spacingBefore != null ? o.spacingBefore : 60) + '" w:after="' + (o.spacingAfter != null ? o.spacingAfter : 120) + '"/>' +
    (o.align ? '<w:jc w:val="' + o.align + '"/>' : '') +
    '</w:pPr>';
  const text = (o.text || '').split('\n');
  const runs = text.map(function(line, i) {
    return '<w:r>' + rpr + '<w:t xml:space="preserve">' + xmlEscape(line) + '</w:t></w:r>' + (i < text.length-1 ? '<w:br/>' : '');
  }).join('');
  return '<w:p>' + ppr + runs + '</w:p>';
}

function wBullet(text) {
  return '<w:p><w:pPr><w:spacing w:before="40" w:after="80"/><w:ind w:start="260"/></w:pPr>' +
    '<w:r><w:rPr><w:b/><w:color w:val="' + DOCX_NAVY + '"/><w:sz w:val="21"/></w:rPr><w:t xml:space="preserve">\u2022  </w:t></w:r>' +
    '<w:r><w:rPr><w:sz w:val="21"/><w:color w:val="' + DOCX_GREY + '"/></w:rPr><w:t xml:space="preserve">' + xmlEscape(text) + '</w:t></w:r></w:p>';
}

function wCheckbox(text) {
  return '<w:p><w:pPr><w:spacing w:before="30" w:after="60"/><w:ind w:start="200"/></w:pPr>' +
    '<w:r><w:rPr><w:sz w:val="22"/></w:rPr><w:t xml:space="preserve">\u2610  </w:t></w:r>' +
    '<w:r><w:rPr><w:sz w:val="20"/></w:rPr><w:t xml:space="preserve">' + xmlEscape(text) + '</w:t></w:r></w:p>';
}

function wHeading(text) {
  return '<w:p><w:pPr><w:pBdr><w:bottom w:val="single" w:sz="6" w:color="' + DOCX_NAVY + '" w:space="2"/></w:pBdr>' +
    '<w:spacing w:before="280" w:after="140"/></w:pPr>' +
    '<w:r><w:rPr><w:b/><w:color w:val="' + DOCX_NAVY + '"/><w:sz w:val="26"/></w:rPr><w:t xml:space="preserve">' + xmlEscape(text) + '</w:t></w:r></w:p>';
}

function wTableBorders() {
  return '<w:tblBorders>' +
    '<w:top w:val="single" w:sz="4" w:color="B0BEC9"/>' +
    '<w:start w:val="single" w:sz="4" w:color="B0BEC9"/>' +
    '<w:bottom w:val="single" w:sz="4" w:color="B0BEC9"/>' +
    '<w:end w:val="single" w:sz="4" w:color="B0BEC9"/>' +
    '<w:insideH w:val="single" w:sz="4" w:color="B0BEC9"/>' +
    '<w:insideV w:val="single" w:sz="4" w:color="B0BEC9"/>' +
    '</w:tblBorders>';
}

function wCell(text, opts) {
  const o = opts || {};
  const widthPct = o.widthPct || 2500;
  const shd = o.shaded ? '<w:shd w:val="clear" w:fill="' + DOCX_LIGHTBLUE + '"/>' : (o.fill ? '<w:shd w:val="clear" w:fill="' + o.fill + '"/>' : '');
  const labelLine = o.label ? '<w:p><w:pPr><w:spacing w:before="20" w:after="20"/></w:pPr><w:r><w:rPr><w:b/><w:sz w:val="19"/><w:color w:val="' + DOCX_GREY + '"/></w:rPr><w:t xml:space="preserve">' + xmlEscape(o.label) + '</w:t></w:r></w:p>' : '';
  const valueColor = o.valueBold ? DOCX_NAVY : DOCX_GREY;
  const valueLine = '<w:p><w:pPr><w:spacing w:before="20" w:after="20"/></w:pPr><w:r><w:rPr>' + (o.valueBold ? '<w:b/>' : '') + '<w:sz w:val="' + (o.size||21) + '"/><w:color w:val="' + valueColor + '"/></w:rPr><w:t xml:space="preserve">' + xmlEscape(text || '\u00A0') + '</w:t></w:r></w:p>';
  return '<w:tc><w:tcPr><w:tcW w:w="' + widthPct + '" w:type="pct"/>' + shd + '</w:tcPr>' + labelLine + valueLine + '</w:tc>';
}

function wTable(rowsHtml, gridCols) {
  const grid = gridCols.map(function(w){ return '<w:gridCol w:w="'+w+'"/>'; }).join('');
  return '<w:tbl><w:tblPr><w:tblW w:w="5000" w:type="pct"/>' + wTableBorders() + '</w:tblPr>' +
    '<w:tblGrid>' + grid + '</w:tblGrid>' + rowsHtml.map(function(cells){ return '<w:tr>' + cells + '</w:tr>'; }).join('') + '</w:tbl>';
}

function wPageBreakPara() {
  return '<w:p><w:r><w:br w:type="page"/></w:r></w:p>';
}

function buildDocumentXml(bodyContentXml) {
  return '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>' +
  '<w:document xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main" ' +
  'xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships">' +
  '<w:body>' + bodyContentXml +
  '<w:sectPr><w:pgSz w:w="11906" w:h="16838"/><w:pgMar w:top="1000" w:right="900" w:bottom="900" w:left="900" w:header="720" w:footer="720" w:gutter="0"/></w:sectPr>' +
  '</w:body></w:document>';
}

const DOCX_CONTENT_TYPES = '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>' +
  '<Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types">' +
  '<Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/>' +
  '<Default Extension="xml" ContentType="application/xml"/>' +
  '<Override PartName="/word/document.xml" ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.document.main+xml"/>' +
  '</Types>';

const DOCX_RELS_MAIN = '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>' +
  '<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">' +
  '<Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="word/document.xml"/>' +
  '</Relationships>';

const DOCX_RELS_DOCUMENT = '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>' +
  '<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"></Relationships>';

function generateDocxBlob(bodyContentXml) {
  const documentXml = buildDocumentXml(bodyContentXml);
  const files = {
    '[Content_Types].xml': fflate.strToU8(DOCX_CONTENT_TYPES),
    '_rels/.rels': fflate.strToU8(DOCX_RELS_MAIN),
    'word/document.xml': fflate.strToU8(documentXml),
    'word/_rels/document.xml.rels': fflate.strToU8(DOCX_RELS_DOCUMENT)
  };
  const zipped = fflate.zipSync(files, { level: 6 });
  return new Blob([zipped], { type: 'application/vnd.openxmlformats-officedocument.wordprocessingml.document' });
}

function triggerDownload(blob, filename) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

</script>

function nowStamp() {
  const d = new Date(); const pad = (n) => String(n).padStart(2,'0');
  return pad(d.getDate())+'/'+pad(d.getMonth()+1)+'/'+d.getFullYear()+' '+pad(d.getHours())+':'+pad(d.getMinutes());
}

function buildGrappeSummary(lot) {
  const list = [];
  REGIONS.forEach(region => {
    for (let g = 1; g <= GRAPPE_COUNT[region]; g++) {
      const ent = entrepreneurOf(lot, region, g);
      const n = menages.filter(m => m.region === region && m.grappe === g).length;
      list.push({ region: region, grappe: g, entreprise: ent.entreprise, telephone: ent.telephone, n: n, color: colorOf(region, g) });
    }
  });
  return list;
}

const tooltip = document.getElementById('tooltip');
let allPoints = [];

function renderMap() {
  const panels = document.getElementById('panels');
  panels.innerHTML = '';
  REGIONS.forEach(function(region) {
    const totalN = menages.filter(function(m){ return m.region === region; }).length;
    const panel = document.createElement('div');
    panel.className = 'panel';
    const h2 = document.createElement('h2');
    h2.textContent = region + ' — ' + GRAPPE_COUNT[region] + ' grappes (' + totalN.toLocaleString('fr-FR') + ' ménages)';
    panel.appendChild(h2);
    const svgNS = 'http://www.w3.org/2000/svg';
    const svg = document.createElementNS(svgNS, 'svg');
    svg.setAttribute('viewBox', '0 0 ' + VIEW_W + ' ' + VIEW_H);
    svg.setAttribute('width', VIEW_W); svg.setAttribute('height', VIEW_H);
    VILLAGES_BASE.filter(function(v){ return v.region === region; }).forEach(function(v) {
      const g = grappeOf(v.region, v.village);
      const circle = document.createElementNS(svgNS, 'circle');
      circle.setAttribute('class', 'vpoint');
      circle.setAttribute('cx', v.x); circle.setAttribute('cy', v.y); circle.setAttribute('r', v.r);
      circle.setAttribute('fill', colorOf(region, g));
      circle.dataset.region = region; circle.dataset.village = v.village; circle.dataset.grappe = g; circle.dataset.n = v.n;
      circle.dataset.entreprise = entrepreneurOf('B', region, g).entreprise;
      svg.appendChild(circle);
    });
    panel.appendChild(svg);
    panels.appendChild(panel);
  });
  allPoints = Array.from(document.querySelectorAll('.vpoint'));
  bindMapPointEvents();
  refreshBlockedVillageMarkers();
}

function bindMapPointEvents() {
  allPoints.forEach(function(pt) {
    pt.addEventListener('mousemove', function(e) {
      tooltip.style.display = 'block';
      tooltip.style.left = (e.clientX + 14) + 'px'; tooltip.style.top = (e.clientY + 10) + 'px';
      const alertLine = pt.classList.contains('has-alert') ? '<br><span style="color:#FFB3B3;">⚠ Ménage(s) bloqué(s) dans ce village</span>' : '';
      tooltip.innerHTML = '<b>' + pt.dataset.village + '</b>' + 'Grappe ' + pt.dataset.grappe + ' — ' + pt.dataset.entreprise + '<br>' + 'Ménages : ' + pt.dataset.n + alertLine;
    });
    pt.addEventListener('mouseleave', function(){ tooltip.style.display = 'none'; });
    pt.addEventListener('click', function(){ applyFilter(pt.dataset.region, parseInt(pt.dataset.grappe)); });
  });
}

function refreshBlockedVillageMarkers() {
  const blockedVillages = new Set();
  menages.forEach(function(m) {
    const e = state[m.ordre]; if (!e) return;
    const hasBlock = ['A','B','C'].some(function(k){ return String(e[k].status).indexOf('bloque') === 0; });
    if (hasBlock) blockedVillages.add(m.region + '|' + m.village);
  });
  allPoints.forEach(function(pt){ pt.classList.toggle('has-alert', blockedVillages.has(pt.dataset.region + '|' + pt.dataset.village)); });
}

function applyFilter(region, grappe) {
  const key = (region !== null) ? keyOf(region, grappe) : null;
  allPoints.forEach(function(pt) {
    const match = (key === null) || (keyOf(pt.dataset.region, parseInt(pt.dataset.grappe)) === key);
    pt.style.opacity = match ? 0.88 : 0.08;
  });
  document.querySelectorAll('#sidebar .grappe-card').forEach(function(c) {
    if (key === null) { c.classList.remove('disabled'); c.classList.remove('active'); }
    else { c.classList.toggle('disabled', c.dataset.key !== key); c.classList.toggle('active', c.dataset.key === key); }
  });
}

function buildStatusSelect(ordre, lotKey, currentStatus, updatedAt) {
  const opts = STATUS_OPTIONS.map(function(s){ return '<option value="'+s.value+'" '+(s.value===currentStatus?'selected':'')+'>'+s.label+'</option>'; }).join('');
  const cls = STATUS_MAP[currentStatus] ? STATUS_MAP[currentStatus].cls : 'st-nonfait';
  const stamp = '<div class="update-stamp" data-ordre="'+ordre+'" data-lot="'+lotKey+'">'+(updatedAt ? 'Maj : '+updatedAt : '')+'</div>';
  return '<select class="status-select '+cls+'" data-ordre="'+ordre+'" data-lot="'+lotKey+'">'+opts+'</select>'+stamp;
}
function buildJustifInput(ordre, lotKey, entry) {
  const need = STATUS_MAP[entry.status] ? STATUS_MAP[entry.status].requiresJustif : false;
  const empty = need && !entry.justif;
  return '<input type="text" class="justif-input '+(empty?'required-empty':'')+'" data-ordre="'+ordre+'" data-lot="'+lotKey+'" value="'+(entry.justif||'').replace(/"/g,'&quot;')+'" placeholder="'+(need ? 'Commentaire obligatoire…' : 'Commentaire (optionnel)')+'" '+(!need ? 'disabled' : '')+'>';
}

function exportCSV(sel, ent, lotKey, rows) {
  const headers = ['N° Ordre','Nom','Telephone','Village','Region','Grappe','Entreprise','Lot','Statut Lot '+lotKey,'Justificatif Lot '+lotKey,'Conforme','Observations'];
  const lines = [headers.join(';')];
  rows.forEach(function(m) {
    const e = getEntry(m.ordre);
    const label = STATUS_MAP[e[lotKey].status] ? STATUS_MAP[e[lotKey].status].label : e[lotKey].status;
    const row = [m.ordre, m.nom, m.tel, m.village, m.region, m.grappe, ent.entreprise, lotKey, label, e[lotKey].justif||'', e.conforme?'OUI':'NON', (e.obs||'').replace(/;/g,',')];
    lines.push(row.map(function(v){ return '"'+String(v).replace(/"/g,'""')+'"'; }).join(';'));
  });
  const csv = '\uFEFF' + lines.join('\r\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url;
  a.download = 'Bordereau_Lot'+lotKey+'_'+sel.region+'_Grappe'+sel.grappe+'_'+ent.entreprise.replace(/\s+/g,'_')+'.csv';
  document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
}

function parseCSVLine(line) {
  const result = []; let cur = '', inQuotes = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (inQuotes) { if (c === '"') { if (line[i+1] === '"') { cur += '"'; i++; } else inQuotes = false; } else cur += c; }
    else { if (c === '"') inQuotes = true; else if (c === ';') { result.push(cur); cur = ''; } else cur += c; }
  }
  result.push(cur); return result;
}
function importCSV(text) {
  const cleanText = text.replace(/^\uFEFF/, '');
  const lines = cleanText.split(/\r\n|\n/).filter(function(l){ return l.trim().length > 0; });
  if (lines.length < 2) throw new Error('Fichier vide ou invalide.');
  const headers = parseCSVLine(lines[0]).map(function(h){ return h.trim(); });
  const idx = function(name){ return headers.indexOf(name); };
  const iOrdre = idx('N° Ordre');
  if (iOrdre === -1) throw new Error('Colonne "N° Ordre" introuvable.');
  const iLot = idx('Lot');
  let updated = 0;
  for (let li = 1; li < lines.length; li++) {
    const cols = parseCSVLine(lines[li]);
    const ordre = cols[iOrdre]; if (!ordre) continue;
    const lotKey = iLot !== -1 ? cols[iLot] : currentLotFilter;
    const iStatut = idx('Statut Lot '+lotKey), iJustif = idx('Justificatif Lot '+lotKey);
    const iConforme = idx('Conforme'), iObs = idx('Observations');
    const e = getEntry(ordre);
    if (iStatut !== -1) {
      const label = (cols[iStatut] || '').trim().toLowerCase();
      const value = STATUS_LABEL_TO_VALUE[label];
      if (value) { if (e[lotKey].status !== value) e[lotKey].updatedAt = nowStamp(); e[lotKey].status = value; }
    }
    if (iJustif !== -1) e[lotKey].justif = cols[iJustif] || '';
    if (iConforme !== -1) e.conforme = (cols[iConforme] || '').trim().toUpperCase() === 'OUI';
    if (iObs !== -1 && cols[iObs]) e.obs = cols[iObs];
    updated++;
  }
  saveState(); refreshBlockedVillageMarkers();
  return updated;
}

const searchInput = document.getElementById('searchInput');
const searchResults = document.getElementById('searchResults');
function doSearch(q) {
  q = q.trim().toLowerCase();
  if (q.length < 2) { searchResults.classList.remove('show'); return; }
  const matches = menages.filter(function(m){
    return m.nom.toLowerCase().indexOf(q) !== -1 || String(m.tel).indexOf(q) !== -1 || String(m.ordre).indexOf(q) !== -1 || m.village.toLowerCase().indexOf(q) !== -1;
  }).slice(0, 30);
  if (matches.length === 0) searchResults.innerHTML = '<div class="search-empty">Aucun ménage trouvé.</div>';
  else searchResults.innerHTML = matches.map(function(m){
      return '<div class="search-result-item" data-region="'+m.region+'" data-grappe="'+m.grappe+'">'+
        '<div class="nm">'+m.nom+' — N° '+m.ordre+'</div>'+
        '<div class="meta2">'+m.village+', '+m.region+' — Grappe '+m.grappe+' — '+m.tel+'</div>'+
        '</div>';

/* ============ DASHBOARD ============ */
function renderDashboard() {
  const dash = document.getElementById('dashboard');
  let totalConforme = 0, totalA = 0, totalB = 0, totalC = 0, totalBloque = 0;
  menages.forEach(function(m) {
    const e = state[m.ordre]; if (e) {
      if (e.conforme) totalConforme++;
      if (e.A && e.A.status === 'fait') totalA++;
      if (e.B && e.B.status === 'fait') totalB++;
      if (e.C && e.C.status === 'fait') totalC++;
      ['A','B','C'].forEach(function(k){ if (e[k] && String(e[k].status).indexOf('bloque') === 0) totalBloque++; });
    }
  });
  const total = menages.length;
  const pct = function(n){ return total ? Math.round(n*1000/total)/10 : 0; };
  let cardsHtml = ''+
    '<div class="dash-card"><div class="num">'+total+'</div><div class="lbl">Ménages total</div></div>'+
    '<div class="dash-card"><div class="num">'+totalConforme+'</div><div class="lbl">Conformes ('+pct(totalConforme)+'%)</div></div>'+
    '<div class="dash-card"><div class="num">'+totalA+'</div><div class="lbl">Lot A fait ('+pct(totalA)+'%)</div></div>'+
    '<div class="dash-card"><div class="num">'+totalB+'</div><div class="lbl">Lot B fait ('+pct(totalB)+'%)</div></div>'+
    '<div class="dash-card"><div class="num">'+totalC+'</div><div class="lbl">Lot C fait ('+pct(totalC)+'%)</div></div>'+
    '<div class="dash-card" style="border-color:#F5C6C6;"><div class="num" style="color:var(--red);">'+totalBloque+'</div><div class="lbl">Statuts bloqués</div></div>';

  let progressHtml = '';
  REGIONS.forEach(function(region) {
    progressHtml += '<div class="progress-section"><h3>'+region+'</h3>';
    buildGrappeSummary('B').filter(function(g){ return g.region === region; }).forEach(function(g) {
      const rows = menages.filter(function(m){ return m.region === g.region && m.grappe === g.grappe; });
      let cA=0, cB=0, cC=0, cConf=0, cBloque=0;
      rows.forEach(function(m) {
        const e = state[m.ordre]; if (e) {
          if (e.A && e.A.status === 'fait') cA++; if (e.B && e.B.status === 'fait') cB++; if (e.C && e.C.status === 'fait') cC++;
          if (e.conforme) cConf++;
          ['A','B','C'].forEach(function(k){ if (e[k] && String(e[k].status).indexOf('bloque') === 0) cBloque++; });
        }
      });
      const n = rows.length;
      const pA = n?cA/n*100:0, pB = n?cB/n*100:0, pC = n?cC/n*100:0, pConf = n?cConf/n*100:0;
      const blocLabel = cBloque > 0 ? ' · <span style="color:var(--red);">'+cBloque+' blocage(s)</span>' : '';
      progressHtml += '<div class="grappe-progress">'+
          '<div class="gp-label"><span class="name"><span class="legend-dot" style="background:'+g.color+'"></span>Grappe '+g.grappe+' — '+g.entreprise+' ('+n+' ménages)'+blocLabel+'</span><span class="pct">'+Math.round(pConf)+'% conforme</span></div>'+
          '<div class="gp-bar-bg">'+
            '<div class="gp-bar-seg" style="width:'+(pA/3)+'%; background:#2E86AB;"></div>'+
            '<div class="gp-bar-seg" style="width:'+(pB/3)+'%; background:#E07A5F;"></div>'+
            '<div class="gp-bar-seg" style="width:'+(pC/3)+'%; background:#2F855A;"></div>'+
          '</div></div>';
    });
    progressHtml += '</div>';
  });
  progressHtml += '<div class="legend-row">'+
      '<span><span class="legend-dot" style="background:#2E86AB;"></span>Lot A</span>'+
      '<span><span class="legend-dot" style="background:#E07A5F;"></span>Lot B</span>'+
      '<span><span class="legend-dot" style="background:#2F855A;"></span>Lot C</span>'+
      '<span style="color:#8A97A3;">Seul le statut "Fait" est compté dans les barres</span></div>';

  const problemRows = [];
  menages.forEach(function(m) {
    const e = state[m.ordre]; if (!e) return;
    ['A','B','C'].forEach(function(k) {
      const st = e[k].status;
      if (st && st !== 'non_fait' && st !== 'en_cours' && st !== 'fait') {
        problemRows.push({ ordre: m.ordre, nom: m.nom, tel: m.tel, village: m.village, region: m.region, grappe: m.grappe,
          lot: k, statusLabel: STATUS_MAP[st]?STATUS_MAP[st].label:st, statusCls: STATUS_MAP[st]?STATUS_MAP[st].cls:'st-autre',
          justif: e[k].justif||'(aucun commentaire)', updatedAt: e[k].updatedAt||'—' });
      }
    });
  });
  problemRows.sort(function(a,b){ return (a.region+a.grappe).localeCompare(b.region+b.grappe); });
  let problemsHtml = '<div class="progress-section"><h3>Ménages à traiter en priorité — '+problemRows.length+' ligne(s)</h3>';
  if (problemRows.length === 0) problemsHtml += '<div style="color:#8A97A3;font-size:12.5px;">Aucun blocage signalé pour le moment.</div>';
  else {
    problemsHtml += '<div class="table-scroll"><table class="bordereau" style="min-width:760px;"><thead><tr>'+
        '<th>N° Ordre</th><th>Nom</th><th>Téléphone</th><th>Village</th><th>Grappe</th><th>Lot</th><th>Statut</th><th>Commentaire</th><th>Dernière MAJ</th>'+
      '</tr></thead><tbody>';
    problemRows.forEach(function(r) {
      problemsHtml += '<tr><td class="center">'+r.ordre+'</td><td>'+r.nom+'</td><td class="center">'+r.tel+'</td><td>'+r.village+'</td>'+
        '<td class="center">'+r.region+' G'+r.grappe+'</td><td class="center">'+r.lot+'</td>'+
        '<td><span class="status-select '+r.statusCls+'" style="display:inline-block;padding:3px 8px;">'+r.statusLabel+'</span></td>'+
        '<td>'+r.justif+'</td><td class="center">'+r.updatedAt+'</td></tr>';
    });
    problemsHtml += '</tbody></table></div>';
  }
  problemsHtml += '</div>';
  dash.innerHTML = '<div class="dash-cards">'+cardsHtml+'</div>'+progressHtml+problemsHtml;
}

function renderVillageTable() {
  const tbody = document.getElementById('villageTableBody');
  if (!tbody) return;
  const term = villageSearchTerm.trim().toLowerCase();
  const rows = VILLAGES_BASE.filter(function(v){ return !term || v.village.toLowerCase().indexOf(term) !== -1; })
    .sort(function(a,b){ return a.region.localeCompare(b.region) || a.village.localeCompare(b.village); });
  tbody.innerHTML = rows.map(function(v) {
    const currentG = grappeOf(v.region, v.village);
    const opts = [];
    for (let g = 1; g <= GRAPPE_COUNT[v.region]; g++) opts.push('<option value="'+g+'" '+(g===currentG?'selected':'')+'>Grappe '+g+'</option>');
    return '<tr><td>'+v.village+'</td><td>'+v.region+'</td><td>'+v.n+'</td>'+
      '<td><span class="swatch" style="background:'+colorOf(v.region,currentG)+'"></span>Grappe '+currentG+'</td>'+
      '<td><select data-region="'+v.region+'" data-village="'+v.village+'">'+opts.join('')+'</select></td></tr>';
  }).join('');
  tbody.querySelectorAll('select').forEach(function(sel) {
    sel.addEventListener('change', function() {
      const region = sel.dataset.region, village = sel.dataset.village;
      const newG = parseInt(sel.value);
      villageOverrides[villageKey(region, village)] = newG;
      saveVillageOverrides();
      rebuildMenages(); renderMapSidebar(); renderMap(); buildBordereauSidebar();
      if (currentGrappeSel) renderBordereau();
      renderVillageTable();
    });
  });
}

function buildFicheSaisieXml(lot, region, grappe, ent, n) {

    : 'LOT ' + lot + ' \u2013 ' + region.toUpperCase() + ', GRAPPE ' + grappe + ' \u2014 ' + ent.entreprise.toUpperCase();

function buildListeNominativeXml(lot, region, grappe, ent, rows) {
  let body = '';
  body += wPara({text: 'ANNEXE \u2013 LISTE NOMINATIVE DES M\u00C9NAGES ATTRIBU\u00C9S', bold: true, size: 30, color: DOCX_NAVY, align: 'center', spacingAfter: 60});
  const subtitle = ent.entreprise + ' \u2014 ' + region + (grappe ? ', Grappe ' + grappe : '') + ' \u2014 ' + rows.length + ' m\u00e9nages';
  body += wPara({text: subtitle, bold: true, size: 22, color: DOCX_GREY, align: 'center', spacingAfter: 200});

  const headerCells = ['N\u00b0','Ordre','Nom du b\u00e9n\u00e9ficiaire','T\u00e9l\u00e9phone','Village'].map(function(h, i){
    const widths = [700,1100,3100,1600,2360];
    return '<w:tc><w:tcPr><w:tcW w:w="'+widths[i]+'" w:type="dxa"/><w:shd w:val="clear" w:fill="'+DOCX_NAVY+'"/></w:tcPr>' +
      '<w:p><w:r><w:rPr><w:b/><w:color w:val="FFFFFF"/><w:sz w:val="18"/></w:rPr><w:t xml:space="preserve">'+xmlEscape(h)+'</w:t></w:r></w:p></w:tc>';
  }).join('');

  const bodyRows = rows.map(function(m, i) {
    const vals = [String(i+1), String(m.ordre), m.nom, m.tel, m.village];
    const widths = [700,1100,3100,1600,2360];
    const shaded = i % 2 === 1;
    return '<w:tr>' + vals.map(function(v, j) {
      return '<w:tc><w:tcPr><w:tcW w:w="'+widths[j]+'" w:type="dxa"/>' + (shaded ? '<w:shd w:val="clear" w:fill="F5F8FA"/>' : '') + '</w:tcPr>' +
        '<w:p><w:r><w:rPr><w:sz w:val="17"/></w:rPr><w:t xml:space="preserve">'+xmlEscape(v)+'</w:t></w:r></w:p></w:tc>';
    }).join('') + '</w:tr>';
  });

  const grid = [700,1100,3100,1600,2360].map(function(w){ return '<w:gridCol w:w="'+w+'"/>'; }).join('');
  body += '<w:tbl><w:tblPr><w:tblW w:w="8860" w:type="dxa"/>' + wTableBorders() + '</w:tblPr>' +
    '<w:tblGrid>' + grid + '</w:tblGrid>' +
    '<w:tr>' + headerCells + '</w:tr>' + bodyRows.join('') + '</w:tbl>';
  return body;
}

function generateDossierDocx(lot, region, grappe) {
  const effectiveRegion = region || 'Kaffrine + Tambacounda';
  const ent = entrepreneurOf(lot, region, grappe);
  let rows;
  if (lot === 'A') rows = menages.slice().sort(function(a,b){ return (a.region+a.village).localeCompare(b.region+b.village) || a.ordre - b.ordre; });
  else rows = menages.filter(function(m){ return m.region === region && m.grappe === grappe; }).sort(function(a,b){ return a.village.localeCompare(b.village) || a.ordre - b.ordre; });

  let body = '';
  body += buildLettreMissionXml(lot, effectiveRegion, grappe, ent, rows.length);
  body += buildOrdreServiceXml(lot, effectiveRegion, grappe, ent, rows.length);
  body += buildFicheSaisieXml(lot, effectiveRegion, grappe, ent, rows.length);
  body += buildListeNominativeXml(lot, effectiveRegion, grappe, ent, rows);

  const blob = generateDocxBlob(body);
  const safeName = ent.entreprise.replace(/[^a-zA-Z0-9]+/g, '_');
  const safeGrappe = grappe ? '_G' + grappe : '';
  const safeRegionPart = region ? region.split(' ')[0] : 'KaffrineTambacounda';
  const filename = 'Dossier_Prestataire_' + safeRegionPart + safeGrappe + '_Lot' + lot + '_' + safeName + '.docx';
  triggerDownload(blob, filename);
}

function renderDossiers() {
  const container = document.getElementById('dossiers');
  let html = '<div class="admin-section"><h3>Dossiers Prestataires (g\u00e9n\u00e9r\u00e9s \u00e0 la demande)</h3>' +
    '<div class="hint">Chaque dossier est g\u00e9n\u00e9r\u00e9 au moment du clic, \u00e0 partir des donn\u00e9es actuelles (entrepreneurs, grappes). Toute modification faite dans l\'onglet Administration est immédiatement reflétée dans les dossiers téléchargés.</div></div>';

  html += '<div class="admin-section"><h3>Lot A \u2014 Pr\u00e9paration globale</h3>';
  const lotA = entrepreneurOf('A', null, null);
  html += '<div class="admin-row"><div class="label-col">Kaffrine + Tambacounda</div>' +
    '<div style="flex:1;font-size:13px;">' + lotA.entreprise + ' \u2014 ' + (lotA.telephone||'\u2014') + ' \u2014 ' + menages.length + ' m\u00e9nages</div>' +
    '<button class="admin-save-btn dossier-btn" data-lot="A" data-region="" data-grappe="">T\u00e9l\u00e9charger</button></div></div>';

  ['B','C'].forEach(function(lot) {
    const lotLabel = lot === 'B' ? 'Installation int\u00e9rieure' : 'Raccordement';
    html += '<div class="admin-section"><h3>Lot ' + lot + ' \u2014 ' + lotLabel + '</h3>';
    REGIONS.forEach(function(region) {
      for (let g = 1; g <= GRAPPE_COUNT[region]; g++) {
        const ent = entrepreneurOf(lot, region, g);
        const n = menages.filter(function(m){ return m.region===region && m.grappe===g; }).length;
        const color = colorOf(region, g);
        html += '<div class="admin-row"><div class="label-col"><span class="swatch" style="background:'+color+'"></span>'+region+' \u2014 Grappe '+g+'</div>' +
          '<div style="flex:1;font-size:13px;">' + ent.entreprise + ' \u2014 ' + (ent.telephone||'\u2014') + ' \u2014 ' + n + ' m\u00e9nages</div>' +
          '<button class="admin-save-btn dossier-btn" data-lot="'+lot+'" data-region="'+region+'" data-grappe="'+g+'">T\u00e9l\u00e9charger</button></div>';
      }
    });
    html += '</div>';
  });

  container.innerHTML = html;
  container.querySelectorAll('.dossier-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      const lot = btn.dataset.lot;
      const region = btn.dataset.region || null;
      const grappe = btn.dataset.grappe ? parseInt(btn.dataset.grappe) : null;
      btn.textContent = 'G\u00e9n\u00e9ration\u2026';
      setTimeout(function() {
        generateDossierDocx(lot, region, grappe);
        btn.textContent = 'T\u00e9l\u00e9charger';
      }, 30);
    });
  });
}
