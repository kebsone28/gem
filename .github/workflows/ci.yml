name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend-tests:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: proquelec
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: proquelec_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - run: npm ci

      - run: npx prisma generate
        env:
          DATABASE_URL: postgresql://proquelec:test_password@localhost:5432/proquelec_test

      - run: npm test
        env:
          DATABASE_URL: postgresql://proquelec:test_password@localhost:5432/proquelec_test
