name: Build & Deploy to Wanekoo

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ============ TEST & LINT ============
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: proquelec_test
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install backend dependencies
        run: npm ci --prefix backend

      - name: Prisma generate
        run: npx prisma generate
        working-directory: backend
        env:
          DATABASE_URL: postgresql://test_user:test_password@localhost:5432/proquelec_test

      - name: Prisma db push (create tables)
        run: npx prisma db push
        working-directory: backend
        env:
          DATABASE_URL: postgresql://test_user:test_password@localhost:5432/proquelec_test

      - name: Lint backend
        run: npm run lint --prefix backend
        continue-on-error: true

      - name: Run backend tests
        run: npm test --prefix backend -- --run
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: test_user
          DB_PASSWORD: test_password
          DB_NAME: proquelec_test
          DATABASE_URL: postgresql://test_user:test_password@localhost:5432/proquelec_test

      # ============ FRONTEND ============
      - name: Install frontend dependencies
        run: npm install --prefix frontend --legacy-peer-deps

      - name: TypeScript check (frontend)
        run: npx typescript --noEmit --project frontend/tsconfig.app.json
        continue-on-error: true

      - name: Lint frontend
        run: npm run lint --prefix frontend
        continue-on-error: true

      - name: Build frontend
        run: npm run build --prefix frontend
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'

      - name: Run frontend unit tests
        run: npm run test:unit --prefix frontend
        continue-on-error: true

  # ============ DEPLOY TO GED VPS ============
  deploy:
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Déploiement via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -euo pipefail
            cd ${{ secrets.VPS_PATH || '/var/www/gedcollect' }}

            echo "→ Récupération du dernier code"
            git fetch --all
            git reset --hard origin/main

            echo "→ Installation des dépendances backend"
            npm ci --prefix backend --legacy-peer-deps

            echo "→ Prisma generate + migrations"
            npx prisma generate --schema=prisma/schema.prisma
            npx prisma migrate deploy --schema=prisma/schema.prisma || echo "Migrations déjà à jour"

            echo "→ Installation des dépendances front"
            npm ci --prefix frontend --legacy-peer-deps

            echo "→ Build du front"
            NODE_OPTIONS='--max-old-space-size=4096' npm run build --prefix frontend

            echo "→ Redémarrage du backend avec pm2"
            npx pm2 restart all

            echo "→ Health‑check"
            sleep 10
            curl -fsS http://localhost:5005/health || echo "⚠️ Health‑check échoué – vérifier manuellement"

      - name: Notifier le résultat
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "✅ Déploiement réussi sur ${{ secrets.VPS_HOST }}"
          else
            echo "❌ Déploiement échoué"
          fi
