name: Build & Deploy to Wanekoo

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ============ TEST & LINT ============
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: proquelec_test
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install backend dependencies
        run: npm ci --prefix backend

      - name: Lint backend
        run: npm run lint --prefix backend
        continue-on-error: true

      - name: Run backend tests
        run: npm test --prefix backend
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: test_user
          DB_PASSWORD: test_password
          DB_NAME: proquelec_test

  # ============ BUILD DOCKER IMAGE ============
  build:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============ DEPLOY TO WANEKOO ============
  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Wanekoo
        env:
          WANEKOO_HOST: ${{ secrets.WANEKOO_HOST }}
          WANEKOO_USER: ${{ secrets.WANEKOO_USER }}
          WANEKOO_PASSWORD: ${{ secrets.WANEKOO_PASSWORD }}
          WANEKOO_DEPLOY_PATH: ${{ secrets.WANEKOO_DEPLOY_PATH }}
        run: |
          # Install SSH client
          apt-get update && apt-get install -y openssh-client sshpass
          
          # Create SSH key
          mkdir -p ~/.ssh
          echo "${{ secrets.WANEKOO_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          
          # Add known hosts
          ssh-keyscan -H $WANEKOO_HOST >> ~/.ssh/known_hosts 2>/dev/null
          
          # Deploy
          cd $WANEKOO_DEPLOY_PATH
          
          # Pull latest code
          ssh -i ~/.ssh/id_rsa $WANEKOO_USER@$WANEKOO_HOST "cd $WANEKOO_DEPLOY_PATH && git pull origin main"
          
          # Run Docker deployment
          ssh -i ~/.ssh/id_rsa $WANEKOO_USER@$WANEKOO_HOST "cd $WANEKOO_DEPLOY_PATH && docker-compose pull && docker-compose up -d"
          
          # Verify deployment
          sleep 10
          ssh -i ~/.ssh/id_rsa $WANEKOO_USER@$WANEKOO_HOST "curl -f http://localhost/api/health || exit 1"

      - name: Notify deployment success
        run: |
          echo "✅ Application deployed successfully to Wanekoo!"
          echo "🌐 URL: https://proquelec.wanekoo.com"

      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ Deployment failed. Check logs above for details."
