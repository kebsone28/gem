name: Build & Deploy to Wanekoo

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ============ TEST & LINT ============
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: proquelec_test
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install backend dependencies
        run: npm ci --prefix backend

      - name: Prisma generate
        run: npx prisma generate
        working-directory: backend
        env:
          DATABASE_URL: postgresql://test_user:test_password@localhost:5432/proquelec_test

      - name: Prisma db push (create tables)
        run: npx prisma db push
        working-directory: backend
        env:
          DATABASE_URL: postgresql://test_user:test_password@localhost:5432/proquelec_test

      - name: Lint backend
        run: npm run lint --prefix backend
        continue-on-error: true

      - name: Run backend tests
        run: npm test --prefix backend -- --run
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: test_user
          DB_PASSWORD: test_password
          DB_NAME: proquelec_test
          DATABASE_URL: postgresql://test_user:test_password@localhost:5432/proquelec_test

      # ============ FRONTEND ============
      - name: Install frontend dependencies
        run: npm install --prefix frontend --legacy-peer-deps

      - name: TypeScript check (frontend)
        run: npx typescript --noEmit --project frontend/tsconfig.app.json
        continue-on-error: true

      - name: Lint frontend
        run: npm run lint --prefix frontend
        continue-on-error: true

      - name: Build frontend
        run: npm run build --prefix frontend
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'

      - name: Run frontend unit tests
        run: npm run test:unit --prefix frontend
        continue-on-error: true

  # ============ DEPLOY TO WANEKOO ============
  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Wanekoo
        env:
          WANEKOO_HOST: ${{ secrets.WANEKOO_HOST }}
          WANEKOO_USER: ${{ secrets.WANEKOO_USER }}
          WANEKOO_PASSWORD: ${{ secrets.WANEKOO_PASSWORD }}
          WANEKOO_DEPLOY_PATH: ${{ secrets.WANEKOO_DEPLOY_PATH }}
        run: |
          set -euo pipefail

          if [ -z "${WANEKOO_HOST:-}" ] || [ -z "${WANEKOO_USER:-}" ] || [ -z "${WANEKOO_DEPLOY_PATH:-}" ] || [ -z "${{ secrets.WANEKOO_SSH_KEY }}" ]; then
            echo "Missing required Wanekoo deployment secrets."
            echo "Expected: WANEKOO_HOST, WANEKOO_USER, WANEKOO_DEPLOY_PATH, WANEKOO_SSH_KEY"
            exit 1
          fi

          # Use ssh-agent for secure key handling (avoids writing key to disk)
          which ssh-agent || apt-get update -qq && apt-get install -qq -y openssh-client
          eval $(ssh-agent -s)
          echo "${{ secrets.WANEKOO_SSH_KEY }}" | ssh-add -

          ssh-keyscan -H $WANEKOO_HOST >> ~/.ssh/known_hosts 2>/dev/null

          ssh -A $WANEKOO_USER@$WANEKOO_HOST "
            set -e
            cd $WANEKOO_DEPLOY_PATH
            git fetch --all
            git reset --hard origin/main
            npm install --no-scripts --legacy-peer-deps
            cd frontend
            npm install --no-scripts --legacy-peer-deps
            NODE_OPTIONS='--max-old-space-size=4096' npm run build
            cd ../backend
            npm install --no-scripts --legacy-peer-deps
            npx pm2 restart all
            sleep 10
            curl -f http://localhost:5005/health
          "

      - name: Notify deployment success
        run: |
          echo "✅ Application deployed successfully to Wanekoo!"
          echo "🌐 URL: https://proquelec.wanekoo.com"

      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ Deployment failed. Check logs above for details."

  # ============ DEPLOY TO GED VPS ============
  deploy-ged:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Vérifier les secrets
        run: |
          if [ -z "${{ secrets.SSH_HOST }}" ]; then
            echo "::error::SSH_HOST secret is not set — add it in Settings > Secrets"
            exit 1
          fi
          if [ -z "${{ secrets.SSH_KEY }}" ]; then
            echo "::error::SSH_KEY secret is not set"
            exit 1
          fi

      - name: Ajouter le host au known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Déploiement vers le VPS GED
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER || 'root' }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || '22' }}
          script_stop: true
          timeout: 300s
          script: |
            set -e

            DEPLOY_PATH="${{ secrets.DEPLOY_PATH }}"
            if [ -z "$DEPLOY_PATH" ]; then
              DEPLOY_PATH="/var/www/proquelec/ged.proquelec.sn"
            fi

            cd "$DEPLOY_PATH"

            git fetch --all
            git reset --hard origin/main

            echo "--- Frontend ---"
            cd frontend
            npm ci --ignore-scripts --legacy-peer-deps --omit=dev
            NODE_OPTIONS='--max-old-space-size=4096' npm run build

            echo "--- Backend ---"
            cd ../backend
            npm ci --ignore-scripts --legacy-peer-deps --omit=dev
            npx prisma generate --schema=prisma/schema.prisma
            npx prisma migrate deploy --schema=prisma/schema.prisma || echo "Migration skipped (no new migrations)"

            echo "--- Restart PM2 ---"
            pm2 restart gem-backend --update-env || pm2 restart all --update-env
            pm2 save || true

            echo "--- Health check ---"
            sleep 10
            curl -fsS http://localhost:5005/health || echo "⚠️ Health check failed — check manually"

      - name: Notify deployment success
        run: |
          echo "Application deployed successfully to GED VPS!"
          echo "URL: https://ged.proquelec.sn"

      - name: Notify on failure
        if: failure()
        run: |
          echo "Deployment to GED VPS failed. Check logs above."
