name: Build & Deploy to Wanekoo

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ============ TEST & LINT ============
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: proquelec_test
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install backend dependencies
        run: npm ci --prefix backend

      - name: Prisma generate
        run: npx prisma generate
        working-directory: backend
        env:
          DATABASE_URL: postgresql://test_user:test_password@localhost:5432/proquelec_test

      - name: Prisma db push (create tables)
        run: npx prisma db push
        working-directory: backend
        env:
          DATABASE_URL: postgresql://test_user:test_password@localhost:5432/proquelec_test

      - name: Lint backend
        run: npm run lint --prefix backend
        continue-on-error: true

      - name: Run backend tests
        run: npm test --prefix backend -- --run
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: test_user
          DB_PASSWORD: test_password
          DB_NAME: proquelec_test
          DATABASE_URL: postgresql://test_user:test_password@localhost:5432/proquelec_test

      # ============ FRONTEND ============
      - name: Install frontend dependencies
        run: npm install --prefix frontend --legacy-peer-deps

      - name: TypeScript check (frontend)
        run: npx typescript --noEmit --project frontend/tsconfig.app.json
        continue-on-error: true

      - name: Lint frontend
        run: npm run lint --prefix frontend
        continue-on-error: true

      - name: Build frontend
        run: npm run build --prefix frontend
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'

      - name: Run frontend unit tests
        run: npm run test:unit --prefix frontend
        continue-on-error: true

  # ============ DEPLOY TO WANEKOO (MANUAL) ==========
  # Deployment has been removed from CI. Use the local deployment script.



  # ============ DEPLOY TO GED VPS ============
