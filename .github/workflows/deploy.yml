name: Build & Deploy to Wanekoo

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ============ TEST & LINT ============
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: proquelec_test
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install backend dependencies
        run: npm ci --prefix backend

      - name: Lint backend
        run: npm run lint --prefix backend
        continue-on-error: true

      - name: Run backend tests
        run: npm test --prefix backend
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: test_user
          DB_PASSWORD: test_password
          DB_NAME: proquelec_test

  # ============ DEPLOY TO WANEKOO ============
  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Wanekoo
        env:
          WANEKOO_HOST: ${{ secrets.WANEKOO_HOST }}
          WANEKOO_USER: ${{ secrets.WANEKOO_USER }}
          WANEKOO_PASSWORD: ${{ secrets.WANEKOO_PASSWORD }}
          WANEKOO_DEPLOY_PATH: ${{ secrets.WANEKOO_DEPLOY_PATH }}
        run: |
          set -euo pipefail

          if [ -z "${WANEKOO_HOST:-}" ] || [ -z "${WANEKOO_USER:-}" ] || [ -z "${WANEKOO_DEPLOY_PATH:-}" ] || [ -z "${{ secrets.WANEKOO_SSH_KEY }}" ]; then
            echo "Missing required Wanekoo deployment secrets."
            echo "Expected: WANEKOO_HOST, WANEKOO_USER, WANEKOO_DEPLOY_PATH, WANEKOO_SSH_KEY"
            exit 1
          fi

          mkdir -p ~/.ssh
          echo "${{ secrets.WANEKOO_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          ssh-keyscan -H $WANEKOO_HOST >> ~/.ssh/known_hosts 2>/dev/null

          ssh -i ~/.ssh/id_rsa $WANEKOO_USER@$WANEKOO_HOST "
            set -e
            cd $WANEKOO_DEPLOY_PATH
            git fetch --all
            git reset --hard origin/main
            npm install --no-scripts --legacy-peer-deps
            cd frontend
            npm install --no-scripts --legacy-peer-deps
            NODE_OPTIONS='--max-old-space-size=4096' npm run build
            cd ../backend
            npm install --no-scripts --legacy-peer-deps
            npx pm2 restart all
            sleep 10
            curl -f http://localhost:5005/health
          "

      - name: Notify deployment success
        run: |
          echo "✅ Application deployed successfully to Wanekoo!"
          echo "🌐 URL: https://proquelec.wanekoo.com"

      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ Deployment failed. Check logs above for details."
